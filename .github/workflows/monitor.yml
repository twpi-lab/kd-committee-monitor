name: 위원회 모집공고 모니터링

on:
  schedule:
    # UTC 기준 22~14시 = KST 07~23시, 매시 0분
    - cron: '0 22-23 * * *'
    - cron: '0 0-14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: committee-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python 3.12 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            python -m playwright install --with-deps chromium
          else
            python -m playwright install chromium
          fi

      - name: 모니터링 1회 실행
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          rm -f state/run_status.json
          python main.py --once

      - name: 크롤링 전체 실패 감지
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import json, os, requests
          from healthcheck import should_send_zero_crawl_alert

          sf = os.path.join('state', 'run_status.json')
          if not os.path.exists(sf):
              print('run_status.json 없음 — zero-count 점검 생략')
              exit(0)
          with open(sf, encoding='utf-8') as f:
              status = json.load(f)
          if not should_send_zero_crawl_alert(status):
              print('zero-count 장애 알림 조건 아님')
              exit(0)

          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('TELEGRAM_CHAT_ID','')
          if token and chat:
              msg = '⚠️ <b>[위원회 모니터링 이상]</b>\n평일 실행에서 이번 크롤링 수집 공고가 0건입니다.\n전체 사이트 크롤링 실패 가능성 — 확인 필요'
              requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                  data={'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}, timeout=10)
          "

      - name: state/ 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          if [ -n "$(git status --porcelain state/)" ]; then
            git add state/
            git commit -m "chore(state): auto-update [skip ci]"
            git push
          else
            echo "변경 없음"
          fi
