name: 위원회 모집공고 모니터링

on:
  schedule:
    # KST 07:00, 12:00, 15:00, 19:00 (UTC -9h)
    - cron: '0 22 * * *'   # 07:00 KST
    - cron: '0 3 * * *'    # 12:00 KST
    - cron: '0 6 * * *'    # 15:00 KST
    - cron: '0 10 * * *'   # 19:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: committee-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Python 3.12 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            python -m playwright install --with-deps chromium
          else
            python -m playwright install chromium
          fi

      - name: 모니터링 1회 실행
        timeout-minutes: 12
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          rm -f state/run_status.json
          python main.py --once

      - name: 크롤링 전체 실패 감지
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import json, os, requests
          from healthcheck import should_send_zero_crawl_alert

          sf = os.path.join('state', 'run_status.json')

          def send_alert(msg):
              token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
              chat = os.environ.get('TELEGRAM_CHAT_ID', '')
              if not token or not chat:
                  raise SystemExit('텔레그램 secrets 없음 — 장애 알림 발송 불가')
              res = requests.post(f'https://api.telegram.org/bot{token}/sendMessage',
                  data={'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'}, timeout=10)
              res.raise_for_status()

          if not os.path.exists(sf):
              print('run_status.json 없음 — main.py 미완료/크래시/타임아웃으로 간주')
              send_alert('⚠️ <b>[위원회 모니터링 이상]</b>\nrun_status.json이 생성되지 않았습니다.\nmain.py가 완료 상태 저장 전 크래시/타임아웃/강제종료 가능성 — 즉시 확인 필요')
              raise SystemExit(1)

          try:
              with open(sf, encoding='utf-8') as f:
                  status = json.load(f)
          except Exception as e:
              print(f'run_status.json 읽기 실패 — 장애 알림 발송: {e}')
              send_alert('⚠️ <b>[위원회 모니터링 이상]</b>\nrun_status.json을 읽을 수 없습니다.\n상태 파일 손상 또는 저장 중단 가능성 — 즉시 확인 필요')
              raise SystemExit(1)

          if not should_send_zero_crawl_alert(status):
              print('zero-count 장애 알림 조건 아님')
              raise SystemExit(0)

          send_alert('⚠️ <b>[위원회 모니터링 이상]</b>\n평일 실행에서 이번 수집 공고가 0건입니다.\n전체 사이트 수집 실패 가능성 — 확인 필요')
          "

      - name: state/ 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          if [ -n "$(git status --porcelain state/)" ]; then
            git add state/
            git commit -m "chore(state): auto-update [skip ci]"
            git push
          else
            echo "변경 없음"
          fi
